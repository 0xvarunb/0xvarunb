<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Varun Bhambri. Mariner. Engineer. Indie builder.">
  <!-- background -->
  <rect width="1200" height="300" fill="#1a1b26"/>

  <!-- thin top + bottom rules: framing the panel like a brand-board -->
  <line x1="60" y1="40" x2="1140" y2="40" stroke="#414868" stroke-width="1"/>
  <line x1="60" y1="260" x2="1140" y2="260" stroke="#414868" stroke-width="1"/>

  <!-- tiny brand-board labels in corners (premium detail) -->
  <text x="60" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#565f89" letter-spacing="2">IDENTITY  /  V.001</text>
  <text x="1140" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#565f89" letter-spacing="2" text-anchor="end">MMXXVI</text>

  <!-- WAYPOINT MARK, left side -->
  <!-- outer circle -->
  <circle cx="180" cy="150" r="60" fill="none" stroke="#7aa2f7" stroke-width="1.5"/>

  <!-- N/S/E/W tick marks; N tick pulses (subtle "live position") -->
  <line x1="180" y1="80" x2="180" y2="72" stroke="#7aa2f7" stroke-width="1.5">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="180" y1="220" x2="180" y2="228" stroke="#7aa2f7" stroke-width="1.5"/>
  <line x1="250" y1="150" x2="258" y2="150" stroke="#7aa2f7" stroke-width="1.5"/>
  <line x1="110" y1="150" x2="102" y2="150" stroke="#7aa2f7" stroke-width="1.5"/>

  <!-- tiny N label, brandkit "premium detail" -->
  <text x="180" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#565f89" text-anchor="middle">N</text>

  <!-- V monogram, centered in the circle -->
  <text x="180" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="56" font-weight="600" fill="#c0caf5" text-anchor="middle">V</text>

  <!-- WORDMARK, right side -->
  <text x="320" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="44" font-weight="600" fill="#c0caf5" letter-spacing="6">VARUN BHAMBRI</text>

  <!-- short accent rule under wordmark -->
  <line x1="320" y1="155" x2="420" y2="155" stroke="#7aa2f7" stroke-width="2"/>

  <!-- positioning line -->
  <text x="320" y="185" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a9b1d6" letter-spacing="1">mariner. engineer. indie builder.</text>

  <!-- tagline (italic accent) -->
  <text x="320" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-style="italic" fill="#7aa2f7">"I ship code. Sometimes literally."</text>

  <!-- bottom-right page-marker style detail -->
  <text x="1140" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#565f89" text-anchor="end" letter-spacing="2">// 0xvarunb  ·  28.6° N  77.2° E</text>
</svg>
