<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Varun Bhambri. Mariner. Engineer. Indie builder.">
  <!-- background -->
  <rect width="1200" height="300" fill="#1a1b26"/>

  <!-- thin top + bottom rules -->
  <line x1="60" y1="40" x2="1140" y2="40" stroke="#414868" stroke-width="1"/>
  <line x1="60" y1="260" x2="1140" y2="260" stroke="#414868" stroke-width="1"/>

  <!-- corner labels -->
  <text x="60" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#565f89" letter-spacing="2">IDENTITY  /  V.001</text>
  <text x="1140" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#565f89" letter-spacing="2" text-anchor="end">MMXXVI</text>

  <!-- WAYPOINT MARK, left side -->
  <!-- outer circle -->
  <circle cx="180" cy="150" r="62" fill="none" stroke="#7aa2f7" stroke-width="1.5"/>

  <!-- N/W/E/S text labels positioned outside the circle, mariner-chart style -->
  <text x="180" y="74" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#c0caf5" text-anchor="middle" letter-spacing="1">N</text>
  <text x="180" y="240" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#c0caf5" text-anchor="middle" letter-spacing="1">S</text>
  <text x="266" y="154" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#c0caf5" letter-spacing="1">E</text>
  <text x="94" y="154" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#c0caf5" text-anchor="end" letter-spacing="1">W</text>

  <!-- N tick (the live position indicator), pulses subtly -->
  <line x1="180" y1="88" x2="180" y2="82" stroke="#7aa2f7" stroke-width="1.5">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </line>
  <!-- other cardinal ticks, static -->
  <line x1="180" y1="218" x2="180" y2="212" stroke="#7aa2f7" stroke-width="1.5"/>
  <line x1="248" y1="150" x2="242" y2="150" stroke="#7aa2f7" stroke-width="1.5"/>
  <line x1="112" y1="150" x2="118" y2="150" stroke="#7aa2f7" stroke-width="1.5"/>

  <!-- V monogram, centered in the circle -->
  <text x="180" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="56" font-weight="600" fill="#c0caf5" text-anchor="middle">V</text>

  <!-- WORDMARK, right side -->
  <text x="320" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="44" font-weight="600" fill="#c0caf5" letter-spacing="6">VARUN BHAMBRI</text>

  <!-- handle in blue, brand-board style -->
  <text x="320" y="168" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="500" fill="#7aa2f7" letter-spacing="2">0xvarunb</text>

  <!-- positioning line -->
  <text x="320" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a9b1d6" letter-spacing="1">mariner. engineer. indie builder.</text>

  <!-- tagline (italic) -->
  <text x="320" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-style="italic" fill="#7aa2f7">"I ship code. Sometimes literally."</text>

  <!-- page-marker footer detail -->
  <text x="1140" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#565f89" text-anchor="end" letter-spacing="2">// EARTH. SOMETIMES SEA.</text>
</svg>
